<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор счета на оплату онлайн 2026 — Бесплатно PDF (Казахстан и РФ)</title>
    <meta name="description" content="Бесплатный сервис создания счетов на оплату для ИП и ТОО. Актуальные реквизиты РК и РФ, расчет налогов и сохранение в PDF.">
    
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        .header-top { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        
        .invoice-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; color: #0f172a; margin-bottom: 30px; text-align: center; }

        .section { margin-bottom: 25px; padding: 15px; border: 1px solid #f1f5f9; border-radius: 10px; }
        .section h2 { font-size: 16px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px solid #f1f5f9; pb: 5px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8fafc; padding: 10px; text-align: left; font-size: 12px; border-bottom: 2px solid #eee; }
        td { padding: 8px; border-bottom: 1px solid #f1f5f9; }

        .total-box { background: #f8fafc; padding: 20px; border-radius: 12px; text-align: right; margin-top: 20px; }
        .total-box strong { font-size: 22px; color: var(--primary); }

        .btn-main { background: var(--primary); color: white; width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        .tools-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .tool-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        
        @media print {
            .header-top, .btn-main, .tools-area, .section h2, button, .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .invoice-card { box-shadow: none; padding: 0; }
            input, textarea { border: none !important; padding: 2px 0 !important; }
        }
    </style>
</head>
<body>

<div class="header-top">
    <h1>Генератор счета на оплату</h1>
</div>

<div class="container">
    <div class="invoice-card">
        <div class="section">
            <h2>Документ</h2>
            <div class="grid">
                <input id="invNum" placeholder="Номер счета">
                <input id="invDate" type="date">
            </div>
        </div>

        <div class="section">
            <h2>Продавец</h2>
            <input id="sName" placeholder="Название организации / ИП">
            <textarea id="sAddr" placeholder="Адрес регистрации"></textarea>
            <div class="grid">
                <input id="sBin" placeholder="БИН / ИИН">
                <input id="sIik" placeholder="ИИК (IBAN счет)">
            </div>
            <div class="grid">
                <input id="sBank" placeholder="Банк">
                <input id="sBik" placeholder="БИК">
            </div>
            <input id="sKbe" placeholder="КБе (для Казахстана)">
        </div>

        <div class="section">
            <h2>Покупатель</h2>
            <input id="bName" placeholder="Название Покупателя">
            <textarea id="bAddr" placeholder="Реквизиты Покупателя (адрес, БИН)"></textarea>
        </div>

        <div class="section">
            <h2>Товары и услуги</h2>
            <table id="itemsTable">
                <thead>
                    <tr>
                        <th>Описание</th>
                        <th width="60">Кол-во</th>
                        <th width="100">Цена</th>
                        <th width="100">Сумма</th>
                        <th width="30" class="no-print"></th>
                    </tr>
                </thead>
                <tbody id="itemsBody"></tbody>
            </table>
            <button onclick="addRow()" style="margin-top:10px;" class="no-print">+ Добавить</button>
        </div>

        <div class="total-box">
            <div>Сумма: <span id="baseSum">0</span></div>
            <label class="no-print"><input type="checkbox" id="vatCheck" onchange="calc()"> НДС (12%)</label>
            <div style="margin-top:10px;"><strong>Итого к оплате: <span id="grandTotal">0</span></strong></div>
        </div>

        <button class="btn-main" onclick="window.print()">📄 Скачать PDF / Печать</button>
    </div>

    <div class="tools-area">
        <div class="tool-card">
            <h3 id="rateTitle">🏦 Курсы валют</h3>
            </div>
        <div class="tool-card">
            <h3>📊 Налог (3% Упрощенка)</h3>
            <input type="number" id="taxInp" placeholder="Доход" oninput="document.getElementById('taxOut').innerText = (this.value * 0.03).toFixed(2)">
            <p>Налог: <strong id="taxOut">0</strong> ₸</p>
        </div>
    </div>
</div>

<script>
    // 1. Инициализация
    let count = localStorage.getItem("inv_count") || 1066;
    count++;
    localStorage.setItem("inv_count", count);
    document.getElementById("invNum").value = "№ " + count;
    document.getElementById("invDate").valueAsDate = new Date();

    // 2. Строки товаров
    function addRow() {
        const row = document.getElementById("itemsBody").insertRow();
        row.innerHTML = `
            <td><input placeholder="Услуга"></td>
            <td><input type="number" value="1" oninput="calc()"></td>
            <td><input type="number" value="0" oninput="calc()"></td>
            <td class="res">0</td>
            <td class="no-print"><button onclick="this.closest('tr').remove();calc()">×</button></td>
        `;
    }
    addRow();

    function calc() {
        let total = 0;
        document.querySelectorAll("#itemsBody tr").forEach(r => {
            const q = r.cells[1].querySelector("input").value || 0;
            const p = r.cells[2].querySelector("input").value || 0;
            const s = q * p;
            r.cells[3].innerText = s.toLocaleString();
            total += s;
        });
        let vat = document.getElementById("vatCheck").checked ? total * 0.12 : 0;
        document.getElementById("baseSum").innerText = total.toLocaleString();
        document.getElementById("grandTotal").innerText = (total + vat).toLocaleString();
    }

    // 3. КУРСЫ ВАЛЮТ (API)
    async function getRates() {
        try {
            const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const data = await res.json();
            const html = `<div style="margin-top:10px; font-weight:bold;">
                1$ = ${data.rates.KZT.toFixed(2)} ₸<br>
                1$ = ${data.rates.RUB.toFixed(2)} ₽
            </div>`;
            document.getElementById('rateTitle').insertAdjacentHTML('afterend', html);
        } catch (e) { console.log("Курсы не загрузились"); }
    }
    getRates();
</script>

</body>
</html>
